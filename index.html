<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Flor mágica</title>

<style>

body{
background:linear-gradient(#ffe6f0,#fff);
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
overflow:hidden;
font-family:Arial;
}

svg{
width:300px;
}

/* tierra */

.tierra{
width:200px;
height:40px;
background:#6b3e26;
border-radius:50%;
position:absolute;
bottom:120px;
}

/* tallo */

.tallo{
fill:none;
stroke:green;
stroke-width:5;
stroke-dasharray:300;
stroke-dashoffset:300;
animation: crecerTallo 3s forwards;
}

@keyframes crecerTallo{
to{
stroke-dashoffset:0;
}
}

/* hojas */

.hoja{
fill:green;
transform:scale(0);
transform-origin:center;
animation: aparecer 1s forwards;
}

.hoja:nth-of-type(1){animation-delay:2s}
.hoja:nth-of-type(2){animation-delay:2.5s}

@keyframes aparecer{
to{transform:scale(1)}
}

/* pétalos */

.petaloFlor{
transform:scale(0);
transform-origin:center;
animation: abrirPetalo 0.8s forwards;
}

.petaloFlor:nth-child(1){animation-delay:3s}
.petaloFlor:nth-child(2){animation-delay:3.2s}
.petaloFlor:nth-child(3){animation-delay:3.4s}
.petaloFlor:nth-child(4){animation-delay:3.6s}
.petaloFlor:nth-child(5){animation-delay:3.8s}

@keyframes abrirPetalo{
to{transform:scale(1)}
}

/* centro */

.centro{
fill:yellow;
opacity:0;
animation: centro 1s forwards;
animation-delay:4s;
}

@keyframes centro{
to{opacity:1}
}

/* pétalos cayendo */

.caida{
position:absolute;
top:-20px;
font-size:20px;
animation: caer linear infinite;
}

@keyframes caer{
0%{transform:translateY(-10vh) rotate(0deg)}
100%{transform:translateY(110vh) rotate(360deg)}
}

/* texto */

.texto{
font-size:30px;
color:#b30059;
margin-top:30px;
opacity:0;
animation: mostrar 2s forwards;
animation-delay:5s;
}

@keyframes mostrar{
to{opacity:1}
}

</style>
</head>

<body>

<div class="tierra"></div>

<svg viewBox="0 0 200 300">

<!-- tallo -->
<path class="tallo" d="M100 280 Q100 200 100 140"/>

<!-- hojas -->
<ellipse class="hoja" cx="90" cy="210" rx="10" ry="18"/>
<ellipse class="hoja" cx="110" cy="190" rx="10" ry="18"/>

<!-- pétalos -->
<circle class="petaloFlor" cx="100" cy="120" r="15" fill="pink"/>
<circle class="petaloFlor" cx="85" cy="135" r="15" fill="pink"/>
<circle class="petaloFlor" cx="115" cy="135" r="15" fill="pink"/>
<circle class="petaloFlor" cx="90" cy="155" r="15" fill="pink"/>
<circle class="petaloFlor" cx="110" cy="155" r="15" fill="pink"/>

<!-- centro -->
<circle class="centro" cx="100" cy="140" r="12"/>

</svg>

<div class="texto">
Este ramo creció solo para ti 🌸
</div>

<script>

function petalo(){

const p=document.createElement("div")
p.classList.add("caida")
p.innerHTML="🌸"

p.style.left=Math.random()*100+"vw"
p.style.animationDuration=(5+Math.random()*5)+"s"

document.body.appendChild(p)

setTimeout(()=>{
p.remove()
},10000)

}

setInterval(petalo,400)

</script>

</body>
</html>
