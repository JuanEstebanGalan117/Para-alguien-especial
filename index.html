<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Ramo animado</title>

<style>

body{
background:#ffe6f0;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
height:100vh;
font-family:Arial;
}

svg{
width:300px;
}

/* animación para dibujar líneas */
.linea{
fill:none;
stroke:green;
stroke-width:4;
stroke-dasharray:200;
stroke-dashoffset:200;
animation: dibujar 3s forwards;
}

.linea:nth-child(2){animation-delay:0.5s;}
.linea:nth-child(3){animation-delay:1s;}

@keyframes dibujar{
to{
stroke-dashoffset:0;
}
}

/* flores creciendo */

.flor{
transform:scale(0);
transform-origin:center;
animation: crecer 1s forwards;
}

.flor:nth-of-type(1){animation-delay:3s;}
.flor:nth-of-type(2){animation-delay:3.5s;}
.flor:nth-of-type(3){animation-delay:4s;}

@keyframes crecer{
to{
transform:scale(1);
}
}

.texto{
margin-top:20px;
font-size:28px;
color:#b30059;
animation: aparecer 2s forwards;
animation-delay:4.5s;
opacity:0;
}

@keyframes aparecer{
to{
opacity:1;
}
}

</style>
</head>

<body>

<svg viewBox="0 0 200 300">

<!-- tallos -->
<path class="linea" d="M100 300 Q100 200 90 120"/>
<path class="linea" d="M100 300 Q120 210 140 120"/>
<path class="linea" d="M100 300 Q80 210 60 140"/>

<!-- flores -->

<g class="flor">
<circle cx="90" cy="110" r="10" fill="yellow"/>
<circle cx="90" cy="95" r="8" fill="pink"/>
<circle cx="105" cy="110" r="8" fill="pink"/>
<circle cx="75" cy="110" r="8" fill="pink"/>
<circle cx="90" cy="125" r="8" fill="pink"/>
</g>

<g class="flor">
<circle cx="140" cy="110" r="10" fill="yellow"/>
<circle cx="140" cy="95" r="8" fill="red"/>
<circle cx="155" cy="110" r="8" fill="red"/>
<circle cx="125" cy="110" r="8" fill="red"/>
<circle cx="140" cy="125" r="8" fill="red"/>
</g>

<g class="flor">
<circle cx="60" cy="130" r="10" fill="yellow"/>
<circle cx="60" cy="115" r="8" fill="purple"/>
<circle cx="75" cy="130" r="8" fill="purple"/>
<circle cx="45" cy="130" r="8" fill="purple"/>
<circle cx="60" cy="145" r="8" fill="purple"/>
</g>

</svg>

<div class="texto">
Este ramo floreció para ti
</div>

</body>
</html>
