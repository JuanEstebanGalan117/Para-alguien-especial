<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Ramo de flores</title>

<style>

body{
    background: linear-gradient(#ffd6e7,#fff);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    font-family: Arial;
}

.ramo{
    position:relative;
    animation: flotar 3s infinite ease-in-out;
}

@keyframes flotar{
    0%{transform:translateY(0)}
    50%{transform:translateY(-10px)}
    100%{transform:translateY(0)}
}

/* tallos */
.tallo{
    width:6px;
    height:120px;
    background:green;
    position:absolute;
    bottom:-120px;
    left:50%;
}

/* flor */
.flor{
    width:40px;
    height:40px;
    position:absolute;
    animation: aparecer 2s forwards;
}

.petalo{
    width:20px;
    height:20px;
    background:pink;
    border-radius:50%;
    position:absolute;
}

.centro{
    width:15px;
    height:15px;
    background:yellow;
    border-radius:50%;
    position:absolute;
    top:12px;
    left:12px;
}

/* posiciones de pétalos */
.petalo:nth-child(1){top:0; left:10px;}
.petalo:nth-child(2){top:10px; left:0;}
.petalo:nth-child(3){top:10px; right:0;}
.petalo:nth-child(4){bottom:0; left:10px;}

@keyframes aparecer{
    from{transform:scale(0); opacity:0;}
    to{transform:scale(1); opacity:1;}
}

.texto{
    margin-top:150px;
    font-size:28px;
    color:#b30059;
}

</style>
</head>

<body>

<div class="ramo">

<div class="tallo"></div>

<div class="flor" style="top:-40px; left:-20px;">
<div class="petalo"></div>
<div class="petalo"></div>
<div class="petalo"></div>
<div class="petalo"></div>
<div class="centro"></div>
</div>

<div class="flor" style="top:-60px; left:20px; animation-delay:1s;">
<div class="petalo"></div>
<div class="petalo"></div>
<div class="petalo"></div>
<div class="petalo"></div>
<div class="centro"></div>
</div>

<div class="flor" style="top:-30px; left:40px; animation-delay:2s;">
<div class="petalo"></div>
<div class="petalo"></div>
<div class="petalo"></div>
<div class="petalo"></div>
<div class="centro"></div>
</div>

</div>

<div class="texto">
Este ramo es para ti 🌸
</div>

</body>
</html>
