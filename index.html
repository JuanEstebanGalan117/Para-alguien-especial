<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Un regalo para ti</title>

<style>

body{
background:linear-gradient(#ffe6f0,#fff);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
font-family:Arial;
overflow:hidden;
}

/* botón */

#boton{
padding:15px 30px;
font-size:20px;
background:#ff4d88;
color:white;
border:none;
border-radius:10px;
cursor:pointer;
transition:0.3s;
}

#boton:hover{
background:#ff1a66;
transform:scale(1.1);
}

/* escena oculta */

#escena{
display:none;
flex-direction:column;
align-items:center;
}

svg{
width:350px;
}

/* tierra */

.tierra{
width:220px;
height:50px;
background:#6b3e26;
border-radius:50%;
position:absolute;
bottom:120px;
}

/* tallos */

.tallo{
fill:none;
stroke:green;
stroke-width:5;
stroke-dasharray:400;
stroke-dashoffset:400;
animation: crecerTallo 3s forwards;
}

@keyframes crecerTallo{
to{stroke-dashoffset:0}
}

/* hojas */

.hoja{
fill:green;
transform:scale(0);
transform-origin:center;
animation: hoja 1s forwards;
}

.hoja:nth-of-type(1){animation-delay:2s}
.hoja:nth-of-type(2){animation-delay:2.5s}
.hoja:nth-of-type(3){animation-delay:3s}

@keyframes hoja{
to{transform:scale(1)}
}

/* flores */

.flor{
transform:scale(0);
transform-origin:center;
animation: flor 1s forwards;
}

.flor:nth-of-type(1){animation-delay:3.5s}
.flor:nth-of-type(2){animation-delay:4s}
.flor:nth-of-type(3){animation-delay:4.5s}

@keyframes flor{
to{transform:scale(1)}
}

/* pétalos cayendo */

.petalo{
position:absolute;
top:-20px;
font-size:20px;
animation: caer linear infinite;
}

@keyframes caer{
0%{transform:translateY(-10vh) rotate(0)}
100%{transform:translateY(110vh) rotate(360deg)}
}

/* mensaje */

.texto{
margin-top:30px;
font-size:32px;
color:#b30059;
opacity:0;
animation: aparecer 2s forwards;
animation-delay:5.5s;
}

@keyframes aparecer{
to{opacity:1}
}

</style>
</head>

<body>

<button id="boton">🎁 Abrir mi regalo</button>

<div id="escena">

<div class="tierra"></div>

<svg viewBox="0 0 200 300">

<!-- tallos -->
<path class="tallo" d="M100 280 Q100 200 90 140"/>
<path class="tallo" d="M100 280 Q120 210 140 140"/>
<path class="tallo" d="M100 280 Q80 210 60 150"/>

<!-- hojas -->
<ellipse class="hoja" cx="95" cy="210" rx="10" ry="18"/>
<ellipse class="hoja" cx="120" cy="200" rx="10" ry="18"/>
<ellipse class="hoja" cx="75" cy="220" rx="10" ry="18"/>

<!-- flores -->
<g class="flor">
<circle cx="90" cy="120" r="12" fill="yellow"/>
<circle cx="90" cy="105" r="10" fill="pink"/>
<circle cx="105" cy="120" r="10" fill="pink"/>
<circle cx="75" cy="120" r="10" fill="pink"/>
<circle cx="90" cy="135" r="10" fill="pink"/>
</g>

<g class="flor">
<circle cx="140" cy="130" r="12" fill="yellow"/>
<circle cx="140" cy="115" r="10" fill="red"/>
<circle cx="155" cy="130" r="10" fill="red"/>
<circle cx="125" cy="130" r="10" fill="red"/>
<circle cx="140" cy="145" r="10" fill="red"/>
</g>

<g class="flor">
<circle cx="60" cy="140" r="12" fill="yellow"/>
<circle cx="60" cy="125" r="10" fill="purple"/>
<circle cx="75" cy="140" r="10" fill="purple"/>
<circle cx="45" cy="140" r="10" fill="purple"/>
<circle cx="60" cy="155" r="10" fill="purple"/>
</g>

</svg>

<div class="texto">
Este ramo floreció solo para ti 🌸
</div>

</div>

<script>

/* abrir regalo */

document.getElementById("boton").onclick=function(){

document.getElementById("boton").style.display="none"
document.getElementById("escena").style.display="flex"

}

/* pétalos cayendo */

function petalo(){

const p=document.createElement("div")
p.classList.add("petalo")
p.innerHTML="🌸"

p.style.left=Math.random()*100+"vw"
p.style.animationDuration=(5+Math.random()*5)+"s"

document.body.appendChild(p)

setTimeout(()=>{
p.remove()
},10000)

}

setInterval(petalo,500)

</script>

</body>
</html>
